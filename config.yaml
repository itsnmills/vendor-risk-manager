# Organization Information
org_name: "Your Healthcare Organization"
org_type: "covered_entity"          # covered_entity | business_associate | hybrid
contact_email: "security@example.com"
hipaa_security_official: "Jane Doe"

# Risk Management Settings
risk_tolerance: "moderate"           # conservative | moderate | aggressive
baa_renewal_warning_days: 90         # Days before BAA expiration to trigger alerts
verification_frequency: "annual"     # annual | semi-annual | quarterly

# Storage
data_dir: "./data"                   # Directory for JSON data files

